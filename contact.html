<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact — Bernard Kisangani</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">Bernard K.</a>
        <nav class="main-nav" aria-label="Navigation principale">
          <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="projects.html">Projets</a></li>
            <li><a href="about.html">À propos</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a class="cta" href="CV actualisé KISANGANI KALONDA Bernard_pif_20251104_005344_0000.pdf" download>Télécharger CV</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1>Contact</h1>
      <form id="contactForm" novalidate>
        <div class="form-row">
          <label for="name">Nom</label>
          <input type="text" id="name" name="name" required aria-required="true">
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required aria-required="true">
        </div>
        <div class="form-row">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required aria-required="true"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn">Envoyer</button>
          <button type="reset" class="btn btn--muted">Réinitialiser</button>
        </div>
        <p id="formStatus" role="status" aria-live="polite"></p>
      </form>
    </main>

    <footer class="site-footer">
      <div class="container">© <span id="year"></span> Bernard Kisangani</div>
    </footer>
    <script src="script.js" defer></script>
  </body>
</html>
